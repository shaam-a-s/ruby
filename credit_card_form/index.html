<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="form-container">
        <h2>Payment Details</h2>
        <form id="paymentForm" onsubmit="return false;">

            <!-- Name Field -->
            <div class="input-group">
                <label for="cardName">Cardholder Name</label>
                <input type="text" id="cardName" placeholder="John Doe" autocomplete="off">
                <div id="nameError" class="error-message">Please enter a valid name (letters only).</div>
            </div>

            <!-- Credit Card Field -->
            <div class="input-group">
                <label for="cardNumber">Credit Card Number</label>
                <input type="text" id="cardNumber" placeholder="4xxx xxxx xxxx xxxx" maxlength="16" autocomplete="off">
                <div id="ccError" class="error-message">Must be 16 digits, starting with 4 or 5.</div>
            </div>

            <!-- CVV Field -->
            <div class="input-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" placeholder="123" maxlength="4" autocomplete="off">
                <div id="cvvError" class="error-message">CVV must be 3 or 4 numeric digits.</div>
            </div>

            <!-- Expiry Field -->
            <div class="input-group">
                <label>Expiry Date</label>
                <div class="expiry-dropdowns">
                    <select id="expMonth">
                        <option value="" disabled selected>MM</option>
                    </select>
                    <select id="expYear">
                        <option value="" disabled selected>YYYY</option>
                    </select>
                </div>
                <div id="dateError" class="error-message">Card has expired or invalid date.</div>
            </div>

            <button type="submit" id="submitBtn">Submit Payment</button>
            <div id="successMessage" class="success-message">Payment successful!</div>

        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
