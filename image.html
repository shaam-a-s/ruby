<!DOCTYPE html>
<html>
<head>
  <title>Overlapping Images</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      margin-top: 100px;
      font-family: Arial;
    }

    .container {
      position: relative;
      width: 400px;
      height: 250px;
    }

    .container img {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 10px;
      transition: transform 0.3s ease, z-index 0.3s;
      cursor: pointer;
    }

    /* Overlapping positions */
    .img1 { left: 0; top: 20px; }
    .img2 { left: 80px; top: 0; }
    .img3 { left: 160px; top: 20px; }

    /* Hover effect */
    .container img:hover {
      transform: scale(1.3);
      z-index: 10;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="https://picsum.photos/id/1015/200/200" class="img1">
  <img src="https://picsum.photos/id/1016/200/200" class="img2">
  <img src="https://picsum.photos/id/1018/200/200" class="img3">
</div>

</body>
</html>
